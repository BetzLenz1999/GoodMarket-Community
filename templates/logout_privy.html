<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store">
    <title>Logging out - GoodMarket</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050816;
            color: #e2e8f0;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .card {
            width: min(90vw, 420px);
            padding: 2rem;
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 20px;
            text-align: center;
            background: rgba(15, 23, 42, 0.86);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
        }
        .spinner {
            width: 42px;
            height: 42px;
            margin: 0 auto 1rem;
            border: 4px solid rgba(148, 163, 184, 0.25);
            border-top-color: #60a5fa;
            border-radius: 999px;
            animation: spin 0.9s linear infinite;
        }
        h1 {
            margin: 0 0 0.5rem;
            font-size: 1.4rem;
        }
        p {
            margin: 0;
            color: #94a3b8;
            line-height: 1.5;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <main class="card" aria-live="polite">
        <div class="spinner" aria-hidden="true"></div>
        <h1>Logging out…</h1>
        <p>Clearing your GoodMarket and Privy session before returning home.</p>
    </main>
    <div id="privyLogoutMount" style="display:none"></div>

    <script>
        window.GM_LOGOUT_COMPLETE_URL = {{ logout_complete_url|tojson }};
        window.GM_PRIVY_CONFIG = {
            appId: {{ privy_app_id|default('', true)|tojson }},
            clientId: {{ privy_client_id|default('', true)|tojson }}
        };

        function clearGoodMarketAuthStorage() {
            try {
                [
                    'privy_wallet_address',
                    'wallet_address',
                    'wallet',
                    'verified',
                    'login_method',
                    'wc_session_topic',
                    'wc_session_address',
                    'wc_session_data',
                    'wc_session_timestamp',
                    'wc_session_chains'
                ].forEach(function (key) {
                    localStorage.removeItem(key);
                    sessionStorage.removeItem(key);
                });
            } catch (_) {}
        }

        function finishLogout() {
            clearGoodMarketAuthStorage();
            window.location.replace(window.GM_LOGOUT_COMPLETE_URL || '/logout?complete=1');
        }

        window.finishLogout = finishLogout;
        clearGoodMarketAuthStorage();
        window.GMLogoutFallbackTimer = setTimeout(finishLogout, 3500);
    </script>

    <script type="module">
        import React, {useEffect} from 'https://esm.sh/react@18.3.1';
        import {createRoot} from 'https://esm.sh/react-dom@18.3.1/client';
        import {PrivyProvider, usePrivy} from 'https://esm.sh/@privy-io/react-auth@3.32.2?deps=react@18.3.1,react-dom@18.3.1';

        function LogoutPrivySession() {
            const {ready, authenticated, logout} = usePrivy();

            useEffect(() => {
                if (!ready) return;

                async function runLogout() {
                    try {
                        if (authenticated) await logout();
                    } finally {
                        clearTimeout(window.GMLogoutFallbackTimer);
                        window.finishLogout();
                    }
                }

                runLogout();
            }, [ready, authenticated, logout]);

            return null;
        }

        const cfg = window.GM_PRIVY_CONFIG || {};
        const mount = document.getElementById('privyLogoutMount');
        if (cfg.appId && mount) {
            createRoot(mount).render(
                React.createElement(PrivyProvider, {
                    appId: cfg.appId,
                    clientId: cfg.clientId || undefined
                }, React.createElement(LogoutPrivySession))
            );
        } else {
            clearTimeout(window.GMLogoutFallbackTimer);
            window.finishLogout();
        }
    </script>
</body>
</html>
